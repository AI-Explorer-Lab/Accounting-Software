services:
  database:
    image: postgres:17-alpine
    container_name: account-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: account
      POSTGRES_USER: account
      POSTGRES_PASSWORD: account
    ports:
      - "5433:5432"
    volumes:
      - account-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account -d account"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  account-db-data:
