default:
  environment:
    name: development
    debug: false
  server:
    host: 127.0.0.1
    port: 8100
    cors_origins:
      - http://127.0.0.1:8100
      - http://localhost:8100
  agent:
    repo_root: null
    validation_timeout_seconds: 900
    max_parallel_projects: 2
    projects: []
  notifications:
    webhook_url: null
    smtp_host: null
    smtp_port: 587
    smtp_starttls: true
    smtp_username: null
    smtp_password: null
    smtp_sender: null
    smtp_recipient: null

development:
  environment:
    name: development
    debug: true

test:
  environment:
    name: test
    debug: false

production:
  environment:
    name: production
    debug: false
